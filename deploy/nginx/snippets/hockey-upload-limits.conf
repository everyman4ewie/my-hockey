# Подключайте внутри location / { перед proxy_pass:
#   include snippets/hockey-upload-limits.conf;
#
# Только лимит тела и таймаут чтения тела — без proxy_* (их часто уже прописывают в конфиге,
# иначе nginx ругается на duplicate proxy_read_timeout).
#
# Загрузка MP4 в кабинет (Node multer до 120 МБ); без client_max_body_size nginx режет ~1 МБ.

client_max_body_size 150m;
client_body_timeout 300s;
